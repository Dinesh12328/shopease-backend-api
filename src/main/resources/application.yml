spring:
  application:
    name: shopease-api
  datasource:
    url: ${DB_URL:jdbc:h2:mem:shopease;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  h2:
    console:
      enabled: ${H2_CONSOLE:true}

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET:c2hvcGVhc2UtZGV2ZWxvcG1lbnQtc2VjcmV0LWtleS1tdXN0LWJlLTMyLWJ5dGVz}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  upload-dir: ${UPLOAD_DIR:uploads}
  admin:
    email: ${ADMIN_EMAIL:admin@shopease.com}
    password: ${ADMIN_PASSWORD:Admin@123}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
